name: Performance Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  animation-perf-gate:
    name: Animation performance gate (30+ fps)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run animation performance gate tests
        run: pnpm exec playwright test tests/e2e/ci-office-perf-gate.spec.ts
        env:
          CI: true

      - name: Upload perf gate artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: perf-gate-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
